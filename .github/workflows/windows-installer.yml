name: Windows Installer

# Builds the HyperRocket Windows installer (.exe) with jpackage + WiX, and
# attaches it to a GitHub Release whenever a version tag (e.g. v1.0.0) is pushed.
# Can also be run manually from the Actions tab via "Run workflow".

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Installer version (e.g. 1.0.0)'
        required: false
        default: '1.0.0'

permissions:
  contents: write

jobs:
  installer:
    runs-on: windows-latest

    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v5
        with:
          submodules: 'recursive'

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build distributable jar
        # shadowJar produces the fat jar in build/libs without running the full
        # 'check' suite (tests/checkstyle/spotbugs), which 'dist' would require.
        run: ./gradlew shadowJar

      - name: Ensure WiX Toolset v3 is installed
        shell: pwsh
        run: |
          if (-not (Get-ChildItem 'C:\Program Files (x86)\WiX Toolset v3*\bin\candle.exe' -ErrorAction SilentlyContinue)) {
            choco install wixtoolset --no-progress -y
          }

      - name: Add WiX to PATH
        shell: pwsh
        run: |
          $bin = Get-ChildItem 'C:\Program Files (x86)\WiX Toolset v3*\bin' -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($bin) { $bin.FullName | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8 }

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="${{ github.event.inputs.version }}"
          fi
          echo "version=${v:-1.0.0}" >> "$GITHUB_OUTPUT"

      - name: Build Windows installer
        shell: pwsh
        run: |
          $jar = Get-ChildItem build/libs/OpenRocket-*.jar | Select-Object -First 1
          if (-not $jar) { throw "No OpenRocket jar found in build/libs" }
          jpackage `
            --type exe `
            --name HyperRocket `
            --app-version "${{ steps.version.outputs.version }}" `
            --vendor "HyperRocket" `
            --description "HyperRocket - model rocket design and flight simulator" `
            --input build/libs `
            --main-jar $jar.Name `
            --main-class info.openrocket.swing.startup.OpenRocket `
            --icon swing/src/main/resources/pix/icon/icon-windows.ico `
            --license-file LICENSE.TXT `
            --java-options "-Xmx2048m" `
            --win-dir-chooser `
            --win-menu `
            --win-menu-group HyperRocket `
            --win-shortcut `
            --win-shortcut-prompt `
            --dest dist-installer

      - name: Generate SHA-256 checksum
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist-installer/*.exe | Select-Object -First 1
          $hash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash.ToLower()
          "$hash  $($exe.Name)" | Out-File -FilePath "$($exe.FullName).sha256" -Encoding ascii
          Write-Host "SHA-256: $hash  $($exe.Name)"

      - name: Upload installer as build artifact
        uses: actions/upload-artifact@v5
        with:
          name: HyperRocket-Windows-Installer
          path: |
            dist-installer/*.exe
            dist-installer/*.sha256

      - name: Publish installer to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-installer/*.exe
            dist-installer/*.sha256
          body: |
            ## Install HyperRocket on Windows

            HyperRocket is free and open-source, but this installer is **not
            code-signed**, so Windows SmartScreen will warn you the first time you
            run it. This is expected — here's how to install:

            1. Download **HyperRocket-${{ steps.version.outputs.version }}.exe** below.
            2. Double-click it. If you see **"Windows protected your PC"**, click
               **More info**, then **Run anyway**.
            3. Follow the install wizard (license → install location → shortcuts → finish).

            The app bundles its own Java runtime, so you don't need Java installed.

            ### Verify your download (optional)
            Compare the file's hash against `HyperRocket-${{ steps.version.outputs.version }}.exe.sha256`:
            ```powershell
            Get-FileHash .\HyperRocket-${{ steps.version.outputs.version }}.exe -Algorithm SHA256
            ```

            > **Smart App Control:** Some newer Windows 11 PCs have Smart App Control,
            > which may block unsigned apps with no "Run anyway" option. Resolving that
            > requires code signing — see `packaging/windows/README.md`.
          generate_release_notes: true
